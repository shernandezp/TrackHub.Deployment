# TrackHub Full Stack Deployment - Docker Compose
# This configuration deploys the frontend and all backend services on a single server
# For split deployment, see docker-compose.frontend.yml and docker-compose.backend.yml

services:
  # =============================================================================
  # REVERSE PROXY
  # =============================================================================
  nginx:
    image: nginx:alpine
    container_name: trackhub-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./certificates:/etc/nginx/ssl:ro
      - ./certbot/webroot:/var/www/certbot:ro
      - trackhub-frontend:/usr/share/nginx/html:ro
    depends_on:
      - frontend
      - authority
      - security
      - manager
      - router
      - geofencing
      - reporting
    networks:
      - trackhub-network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # =============================================================================
  # FRONTEND
  # =============================================================================
  frontend:
    build:
      context: ../TrackHub
      dockerfile: ../TrackHub.Deployment/docker/Dockerfile.frontend
      args:
        - REACT_APP_DEFAULT_LAT=${REACT_APP_DEFAULT_LAT:-4.624335}
        - REACT_APP_DEFAULT_LNG=${REACT_APP_DEFAULT_LNG:--74.063644}
        - REACT_APP_CLIENT_ID=${REACT_APP_CLIENT_ID:-web_client}
        - REACT_APP_AUTHORIZATION_ENDPOINT=${REACT_APP_AUTHORIZATION_ENDPOINT}
        - REACT_APP_TOKEN_ENDPOINT=${REACT_APP_TOKEN_ENDPOINT}
        - REACT_APP_CALLBACK_ENDPOINT=${REACT_APP_CALLBACK_ENDPOINT}
        - REACT_APP_REVOKE_TOKEN_ENDPOINT=${REACT_APP_REVOKE_TOKEN_ENDPOINT}
        - REACT_APP_LOGOUT_ENDPOINT=${REACT_APP_LOGOUT_ENDPOINT}
        - REACT_APP_MANAGER_ENDPOINT=${REACT_APP_MANAGER_ENDPOINT}
        - REACT_APP_ROUTER_ENDPOINT=${REACT_APP_ROUTER_ENDPOINT}
        - REACT_APP_SECURITY_ENDPOINT=${REACT_APP_SECURITY_ENDPOINT}
        - REACT_APP_GEOFENCING_ENDPOINT=${REACT_APP_GEOFENCING_ENDPOINT}
        - REACT_APP_REPORTING_ENDPOINT=${REACT_APP_REPORTING_ENDPOINT}
    container_name: trackhub-frontend
    volumes:
      - trackhub-frontend:/app/build
    networks:
      - trackhub-network

  # =============================================================================
  # AUTHORITY SERVER (OpenIddict Identity Server)
  # =============================================================================
  authority:
    build:
      context: ../TrackHub.AuthorityServer
      dockerfile: ../TrackHub.Deployment/docker/Dockerfile.authority
    container_name: trackhub-authority
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__Security=${DB_CONNECTION_SECURITY}
      - AllowedCorsOrigins=${ALLOWED_CORS_ORIGINS}
      - OpenIddict__LoadCertFromFile=true
      - OpenIddict__Path=/app/certificates/certificate.pfx
      - OpenIddict__Password=${CERTIFICATE_PASSWORD}
      - OpenIddict__Scopes=${OPENIDDICT_SCOPES:-mobile_scope,web_scope,sec_scope}
    volumes:
      - ./certificates:/app/certificates:ro
    networks:
      - trackhub-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      - db-init

  # =============================================================================
  # SECURITY API (GraphQL)
  # =============================================================================
  security:
    build:
      context: ../TrackHubSecurity
      dockerfile: ../TrackHub.Deployment/docker/Dockerfile.security
    container_name: trackhub-security
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__Security=${DB_CONNECTION_SECURITY}
      - AllowedCorsOrigins=${ALLOWED_CORS_ORIGINS}
      - AuthorityServer__Authority=${AUTHORITY_URL}
      - AuthorityServer__ValidateAudience=true
      - AuthorityServer__ValidateIssuer=true
      - AuthorityServer__ValidateIssuerSigningKey=true
      - AppSettings__GraphQLManagerService=${GRAPHQL_MANAGER_SERVICE}
      - AppSettings__EncryptionKey=${ENCRYPTION_KEY}
      - OpenIddict__LoadCertFromFile=true
      - OpenIddict__Path=/app/certificates/certificate.pfx
      - OpenIddict__Password=${CERTIFICATE_PASSWORD}
    volumes:
      - ./certificates:/app/certificates:ro
    networks:
      - trackhub-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      - authority

  # =============================================================================
  # MANAGER API (GraphQL)
  # =============================================================================
  manager:
    build:
      context: ../TrackHub.Manager
      dockerfile: ../TrackHub.Deployment/docker/Dockerfile.manager
    container_name: trackhub-manager
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=${DB_CONNECTION_MANAGER}
      - AllowedCorsOrigins=${ALLOWED_CORS_ORIGINS}
      - AuthorityServer__Authority=${AUTHORITY_URL}
      - AuthorityServer__ValidateAudience=true
      - AuthorityServer__ValidateIssuer=true
      - AuthorityServer__ValidateIssuerSigningKey=true
      - AppSettings__GraphQLIdentityService=${GRAPHQL_IDENTITY_SERVICE}
      - AppSettings__GraphQLSecurityService=${GRAPHQL_SECURITY_SERVICE}
      - AppSettings__EncryptionKey=${ENCRYPTION_KEY}
      - OpenIddict__LoadCertFromFile=true
      - OpenIddict__Path=/app/certificates/certificate.pfx
      - OpenIddict__Password=${CERTIFICATE_PASSWORD}
    volumes:
      - ./certificates:/app/certificates:ro
    networks:
      - trackhub-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      - security

  # =============================================================================
  # ROUTER API (GraphQL)
  # =============================================================================
  router:
    build:
      context: ../TrackHubRouter
      dockerfile: ../TrackHub.Deployment/docker/Dockerfile.router
    container_name: trackhub-router
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - AllowedCorsOrigins=${ALLOWED_CORS_ORIGINS}
      - AuthorityServer__Authority=${AUTHORITY_URL}
      - AuthorityServer__ValidateAudience=true
      - AuthorityServer__ValidateIssuer=true
      - AuthorityServer__ValidateIssuerSigningKey=true
      - AppSettings__GraphQLIdentityService=${GRAPHQL_IDENTITY_SERVICE}
      - AppSettings__GraphQLManagerService=${GRAPHQL_MANAGER_SERVICE}
      - AppSettings__EncryptionKey=${ENCRYPTION_KEY}
      - AppSettings__Protocols__0=CommandTrack
      - AppSettings__Protocols__1=GeoTab
      - AppSettings__Protocols__2=GpsGate
      - AppSettings__Protocols__3=Traccar
      - OpenIddict__LoadCertFromFile=true
      - OpenIddict__Path=/app/certificates/certificate.pfx
      - OpenIddict__Password=${CERTIFICATE_PASSWORD}
    volumes:
      - ./certificates:/app/certificates:ro
    networks:
      - trackhub-network
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      - manager

  # =============================================================================
  # GEOFENCING API (GraphQL)
  # =============================================================================
  geofencing:
    build:
      context: ../TrackHub.Geofencing
      dockerfile: ../TrackHub.Deployment/docker/Dockerfile.geofencing
    container_name: trackhub-geofencing
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=${DB_CONNECTION_MANAGER}
      - AllowedCorsOrigins=${ALLOWED_CORS_ORIGINS}
      - AuthorityServer__Authority=${AUTHORITY_URL}
      - AuthorityServer__ValidateAudience=true
      - AuthorityServer__ValidateIssuer=true
      - AuthorityServer__ValidateIssuerSigningKey=true
      - AppSettings__GraphQLIdentityService=${GRAPHQL_IDENTITY_SERVICE}
      - OpenIddict__LoadCertFromFile=true
      - OpenIddict__Path=/app/certificates/certificate.pfx
      - OpenIddict__Password=${CERTIFICATE_PASSWORD}
    volumes:
      - ./certificates:/app/certificates:ro
    networks:
      - trackhub-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 384M
        reservations:
          memory: 192M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      - manager

  # =============================================================================
  # REPORTING API (REST)
  # =============================================================================
  reporting:
    build:
      context: ../TrackHub.Reporting
      dockerfile: ../TrackHub.Deployment/docker/Dockerfile.reporting
    container_name: trackhub-reporting
    restart: unless-stopped
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ASPNETCORE_URLS=http://+:8080
      - AllowedCorsOrigins=${ALLOWED_CORS_ORIGINS}
      - AuthorityServer__Authority=${AUTHORITY_URL}
      - AuthorityServer__ValidateAudience=true
      - AuthorityServer__ValidateIssuer=true
      - AuthorityServer__ValidateIssuerSigningKey=true
      - AppSettings__GraphQLIdentityService=${GRAPHQL_IDENTITY_SERVICE}
      - AppSettings__GraphQLRouterService=${GRAPHQL_ROUTER_SERVICE}
      - AppSettings__GraphQLGeofenceService=${GRAPHQL_GEOFENCE_SERVICE}
      - OpenIddict__LoadCertFromFile=true
      - OpenIddict__Path=/app/certificates/certificate.pfx
      - OpenIddict__Password=${CERTIFICATE_PASSWORD}
    volumes:
      - ./certificates:/app/certificates:ro
    networks:
      - trackhub-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 384M
        reservations:
          memory: 192M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    depends_on:
      - router
      - geofencing

  # =============================================================================
  # DATABASE INITIALIZATION (runs once)
  # =============================================================================
  db-init:
    build:
      context: .
      dockerfile: docker/Dockerfile.db-init
    container_name: trackhub-db-init
    environment:
      - DB_CONNECTION_SECURITY=${DB_CONNECTION_SECURITY}
      - DB_CONNECTION_MANAGER=${DB_CONNECTION_MANAGER}
    volumes:
      - ./config/clients.json:/app/clients.json:ro
      - db-init-flag:/app/flags
    networks:
      - trackhub-network

# =============================================================================
  # SYNC WORKER (Background Service)
  # =============================================================================
  syncworker:
    build:
      context: ../TrackHubRouter
      dockerfile: ../TrackHub.Deployment/docker/Dockerfile.syncworker
    container_name: trackhub-syncworker
    restart: unless-stopped
    environment:
      - DOTNET_ENVIRONMENT=Production
      - AuthorityServer__Authority=${AUTHORITY_URL}
      - AuthorityServer__ClientId=${SYNCWORKER_CLIENT_ID}
      - AuthorityServer__ClientSecret=${SYNCWORKER_CLIENT_SECRET}
      - AppSettings__GraphQLIdentityService=${GRAPHQL_IDENTITY_SERVICE}
      - AppSettings__GraphQLManagerService=${GRAPHQL_MANAGER_SERVICE}
      - OpenIddict__LoadCertFromFile=true
      - OpenIddict__Path=/app/certificates/certificate.pfx
      - OpenIddict__Password=${CERTIFICATE_PASSWORD}
    volumes:
      - ./certificates:/app/certificates:ro
    networks:
      - trackhub-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          memory: 128M
    depends_on:
      authority:
        condition: service_healthy
      manager:
        condition: service_healthy

# =============================================================================
# NETWORKS
# =============================================================================
networks:
  trackhub-network:
    driver: bridge

# =============================================================================
# VOLUMES
# =============================================================================
volumes:
  trackhub-frontend:
    driver: local
  db-init-flag:
    driver: local
